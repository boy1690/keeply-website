<!DOCTYPE html>
<html lang="{{LANG}}" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4F46E5" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://www.google-analytics.com; font-src 'self'; connect-src 'self' https://docs.google.com https://*.google-analytics.com https://*.analytics.google.com; form-action 'self' https://docs.google.com; base-uri 'self'; object-src 'none'; upgrade-insecure-requests" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <title>{{META_TITLE}}</title>
  <meta name="description" content="{{META_DESCRIPTION}}" />

  <link rel="canonical" href="{{CANONICAL_URL}}" />
  <link rel="alternate" hreflang="en" href="{{HREF_EN}}" />
  <link rel="alternate" hreflang="zh-TW" href="{{HREF_ZH_TW}}" />
  <link rel="alternate" hreflang="x-default" href="{{HREF_EN}}" />

  <link rel="icon" href="{{ASSET_PREFIX}}favicon.ico" sizes="32x32" />
  <link rel="icon" href="{{ASSET_PREFIX}}favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="{{ASSET_PREFIX}}apple-touch-icon.png" />
  <link rel="manifest" href="{{ASSET_PREFIX}}site.webmanifest" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{CANONICAL_URL}}" />
  <meta property="og:title" content="{{META_TITLE}}" />
  <meta property="og:description" content="{{META_DESCRIPTION}}" />
  <meta property="og:image" content="https://keeply.work/og-image.png" />
  <meta property="og:site_name" content="Keeply" />
  <meta property="og:locale" content="{{OG_LOCALE}}" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{META_TITLE}}" />
  <meta name="twitter:description" content="{{META_DESCRIPTION}}" />
  <meta name="twitter:image" content="https://keeply.work/og-image.png" />

  <link rel="preload" href="{{ASSET_PREFIX}}style.css" as="style" />
  <link rel="stylesheet" href="{{ASSET_PREFIX}}style.css" />
</head>

<body class="bg-white text-gray-900 font-sans antialiased">

  <div id="nav-root"></div>

  <!-- Hero -->
  <section class="relative pt-32 pb-16 md:pt-40 md:pb-20 overflow-hidden bg-gradient-to-b from-brand-50 to-white">
    <div class="max-w-4xl mx-auto px-6 text-center">
      <h1 class="text-4xl md:text-5xl font-bold leading-tight tracking-tight mb-4">{{HERO_H1_HTML}}</h1>
      <p class="text-lg text-gray-600 max-w-2xl mx-auto mb-2">{{HERO_SUB}}</p>
      <p class="text-sm text-gray-500 max-w-2xl mx-auto">{{HERO_SUB2}}</p>
    </div>
  </section>

  <!-- Cards grid -->
  <section class="py-12 md:py-16">
    <div class="max-w-5xl mx-auto px-6">
      <div class="grid md:grid-cols-2 gap-6">
        {{#EACH cards}}
        <a href="{{href}}" class="group bg-white border-2 border-gray-200 hover:border-brand-400 rounded-2xl p-6 transition-all">
          <div class="flex items-start gap-4">
            <div class="w-12 h-12 {{bg}} rounded-xl flex items-center justify-center text-2xl shrink-0">{{icon}}</div>
            <div class="flex-1">
              <h3 class="text-lg font-bold text-gray-900 group-hover:text-brand-600">{{title}}</h3>
              <p class="text-sm text-gray-600 mt-1">{{hook_html}}</p>
              <p class="text-xs text-brand-600 font-medium mt-3">{{read_link}}</p>
            </div>
          </div>
        </a>
        {{/EACH}}
      </div>
    </div>
  </section>

  <!-- What is Keeply sub-callout -->
  <section class="bg-brand-50 border-t border-brand-100 py-12 md:py-16">
    <div class="max-w-3xl mx-auto px-6 text-center">
      <h2 class="text-xl md:text-2xl font-bold text-gray-900 mb-3">{{WHAT_IS_TITLE}}</h2>
      <p class="text-gray-700 leading-relaxed">{{WHAT_IS_BODY}}</p>
      <div class="flex flex-col sm:flex-row gap-3 justify-center mt-6">
        <a href="{{CTA_HOME}}#download" class="bg-brand-600 hover:bg-brand-700 text-white font-medium px-8 py-3 rounded-full transition-colors">{{CTA_PRIMARY}}</a>
        <a href="{{CTA_HOME}}#pricing" class="border-2 border-brand-600 text-brand-600 hover:bg-brand-50 font-medium px-8 py-3 rounded-full transition-colors">{{CTA_SECONDARY}}</a>
      </div>
    </div>
  </section>

  <div id="footer-root"></div>

  <script src="{{ASSET_PREFIX}}consent-api.js" defer></script>
  <script src="{{ASSET_PREFIX}}components.js" defer></script>
  <script src="{{ASSET_PREFIX}}cookie-banner.js" defer></script>
  <script src="{{ASSET_PREFIX}}ga4-loader.js" defer></script>
  <script src="{{ASSET_PREFIX}}i18n-loader.js" defer></script>

</body>
</html>
