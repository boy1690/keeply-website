<head>

  <meta name="twitter:image" content="https://keeply.work/og-image.png" />

  <!-- Tailwind CSS (compiled) -->
  <link rel="preload" href="style.css" as="style" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-white text-gray-900 font-sans antialiased">

  <!-- Nav (minimal) -->
  <nav class="fixed top-0 w-full bg-white/80 backdrop-blur-lg border-b border-gray-100 z-50">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-center">
      <a href="/" class="flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" class="w-9 h-9">
          <defs>
            <linearGradient id="ring" x1="80" y1="404" x2="434" y2="112" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#4338CA"/><stop offset="1" stop-color="#4F46E5"/>
            </linearGradient>
            <linearGradient id="amber" x1="115" y1="171" x2="270" y2="82" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#F59E0B"/><stop offset="1" stop-color="#FFB300"/>
            </linearGradient>
            <linearGradient id="doc-front" x1="166" y1="164" x2="308" y2="372" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#5D54F6"/><stop offset="1" stop-color="#4F46E5"/>
            </linearGradient>
            <linearGradient id="doc-back" x1="208" y1="160" x2="364" y2="350" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#9C98FF"/><stop offset="1" stop-color="#6F6AF0"/>
            </linearGradient>
          </defs>
          <g>
            <path d="M396 129C429 159 448 200 448 255C448 363 360 451 252 451C145 451 58 368 56 263C55 206 75 158 111 123" stroke="url(#ring)" stroke-width="44" stroke-linecap="round"/>
            <path d="M111 123C145 91 190 72 239 72C253 72 265 73 278 76" stroke="url(#amber)" stroke-width="44" stroke-linecap="round"/>
            <path d="M236 54L313 79L254 134L236 54Z" fill="url(#amber)"/>
            <rect x="220" y="150" width="152" height="206" rx="32" fill="url(#doc-back)" opacity="0.48"/>
            <rect x="192" y="167" width="152" height="206" rx="32" fill="url(#doc-back)" opacity="0.72"/>
            <rect x="164" y="184" width="152" height="206" rx="32" fill="url(#doc-front)"/>
            <path d="M250 184H316V247L250 184Z" fill="#BDBAFF" opacity="0.95"/>
          </g>
        </svg>
        <span class="text-xl font-bold text-brand-700">Keeply</span>
      </a>
    </div>
  </nav>

  <!-- Language Selector -->
  <main class="min-h-screen flex flex-col items-center justify-center px-6 pt-24 pb-16">
    <div class="w-20 h-20 bg-brand-600 rounded-2xl mb-8 flex items-center justify-center shadow-lg shadow-brand-600/25">
      <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
    </div>

    <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-2 text-center">Choose your language</h1>
    <p class="text-gray-500 mb-10 text-center">選擇你的語言 / 言語を選択 / Sprache wählen</p>

    <!-- Recommended language (filled by JS) -->
    <div id="recommended" class="hidden max-w-xl w-full bg-brand-50 border-2 border-brand-300 rounded-xl p-4 mb-6 flex items-center justify-between">
      <div>
        <div class="text-sm text-brand-600 font-medium mb-1">Recommended for you</div>
        <div id="recommended-label" class="text-lg font-bold"></div>
        <div class="text-sm text-gray-500">Based on your browser language</div>
      </div>
      <a id="recommended-link" href="/en/" class="bg-brand-600 text-white px-6 py-2.5 rounded-full font-medium hover:bg-brand-700 transition-all hover:shadow-lg hover:shadow-brand-600/25">
        Continue →
      </a>
    </div>

    <!-- Language grid -->
    <div class="max-w-2xl w-full grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2">
      <a href="/zh-TW/" class="px-4 py-3 rounded-lg hover:bg-brand-50 transition text-center border border-gray-100 hover:border-brand-300"><div class="font-medium">繁體中文</div></a>
      <a href="/zh-CN/" class="px-4 py-3 rounded-lg hover:bg-brand-50 transition text-center border border-gray-100 hover:border-brand-300"><div class="font-medium">简体中文</div></a>
      <a href="/en/" class="px-4 py-3 rounded-lg hover:bg-brand-50 transition text-center border border-gray-100 hover:border-brand-300"><div class="font-medium">English</div></a>
      <a href="/ja/" class="px-4 py-3 rounded-lg hover:bg-brand-50 transition text-center border border-gray-100 hover:border-brand-300"><div class="font-medium">日本語</div></a>
      <a href="/ko/" class="px-4 py-3 rounded-lg hover:bg-brand-50 transition text-center border border-gray-100 hover:border-brand-300"><div class="font-medium">한국어</div></a>
      <a href="/de/" class="px-4 py-3 rounded-lg hover:bg-brand-50 transition text-center border border-gray-100 hover:border-brand-300"><div class="font-medium">Deutsch</div></a>
      <a href="/fr/" class="px-4 py-3 rounded-lg hover:bg-brand-50 transition text-center border border-gray-100 hover:border-brand-300"><div class="font-medium">Français</div></a>
      <a href="/es/" class="px-4 py-3 rounded-lg hover:bg-brand-50 transition text-center border border-gray-100 hover:border-brand-300"><div class="font-medium">Español</div></a>
      <a href="/pt/" class="px-4 py-3 rounded-lg hover:bg-brand-50 transition text-center border border-gray-100 hover:border-brand-300"><div class="font-medium">Português</div></a>
      <a href="/it/" class="px-4 py-3 rounded-lg hover:bg-brand-50 transition text-center border border-gray-100 hover:border-brand-300"><div class="font-medium">Italiano</div></a>
      <a href="/nl/" class="px-4 py-3 rounded-lg hover:bg-brand-50 transition text-center border border-gray-100 hover:border-brand-300"><div class="font-medium">Nederlands</div></a>
      <a href="/pl/" class="px-4 py-3 rounded-lg hover:bg-brand-50 transition text-center border border-gray-100 hover:border-brand-300"><div class="font-medium">Polski</div></a>
      <a href="/cs/" class="px-4 py-3 rounded-lg hover:bg-brand-50 transition text-center border border-gray-100 hover:border-brand-300"><div class="font-medium">Čeština</div></a>
      <a href="/hu/" class="px-4 py-3 rounded-lg hover:bg-brand-50 transition text-center border border-gray-100 hover:border-brand-300"><div class="font-medium">Magyar</div></a>
      <a href="/tr/" class="px-4 py-3 rounded-lg hover:bg-brand-50 transition text-center border border-gray-100 hover:border-brand-300"><div class="font-medium">Türkçe</div></a>
      <a href="/fi/" class="px-4 py-3 rounded-lg hover:bg-brand-50 transition text-center border border-gray-100 hover:border-brand-300"><div class="font-medium">Suomi</div></a>
      <a href="/sv/" class="px-4 py-3 rounded-lg hover:bg-brand-50 transition text-center border border-gray-100 hover:border-brand-300"><div class="font-medium">Svenska</div></a>
      <a href="/no/" class="px-4 py-3 rounded-lg hover:bg-brand-50 transition text-center border border-gray-100 hover:border-brand-300"><div class="font-medium">Norsk</div></a>
      <a href="/da/" class="px-4 py-3 rounded-lg hover:bg-brand-50 transition text-center border border-gray-100 hover:border-brand-300"><div class="font-medium">Dansk</div></a>
    </div>

    <p class="mt-10 text-sm text-gray-400 text-center">© 2026 Keeply. All rights reserved.</p>
  </main>

  <script>
  (function () {
    var LANG_MAP = {
      'zh-tw': { code: 'zh-TW', label: '繁體中文' },
      'zh-cn': { code: 'zh-CN', label: '简体中文' },
      'zh': { code: 'zh-TW', label: '繁體中文' },
      'en': { code: 'en', label: 'English' },
      'ja': { code: 'ja', label: '日本語' },
      'ko': { code: 'ko', label: '한국어' },
      'de': { code: 'de', label: 'Deutsch' },
      'fr': { code: 'fr', label: 'Français' },
      'es': { code: 'es', label: 'Español' },
      'pt': { code: 'pt', label: 'Português' },
      'it': { code: 'it', label: 'Italiano' },
      'nl': { code: 'nl', label: 'Nederlands' },
      'pl': { code: 'pl', label: 'Polski' },
      'cs': { code: 'cs', label: 'Čeština' },
      'hu': { code: 'hu', label: 'Magyar' },
      'tr': { code: 'tr', label: 'Türkçe' },
      'fi': { code: 'fi', label: 'Suomi' },
      'sv': { code: 'sv', label: 'Svenska' },
      'no': { code: 'no', label: 'Norsk' },
      'da': { code: 'da', label: 'Dansk' }
    };
    // If user already chose a language, redirect immediately
    try {
      var stored = localStorage.getItem('keeply-lang');
      if (stored) { window.location.replace('/' + stored + '/'); return; }
    } catch (e) {}
    // Detect browser language and show recommendation
    var nav = (navigator.language || '').toLowerCase();
    var match = LANG_MAP[nav] || LANG_MAP[nav.split('-')[0]];
    if (match) {
      var rec = document.getElementById('recommended');
      var label = document.getElementById('recommended-label');
      var link = document.getElementById('recommended-link');
      if (rec && label && link) {
        label.textContent = match.label;
        link.href = '/' + match.code + '/';
        rec.classList.remove('hidden');
      }
    }
  })();
  </script>
</body>
</html>
