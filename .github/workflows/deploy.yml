name: Deploy Website to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        # Fetches latest SHA-256 checksums from GitHub releases, compiles
        # Tailwind CSS, regenerates localized pages, injects JSON-LD, and
        # recomputes SRI hashes. See specs/website/021-download-checksums.
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # IndexNow: notify Bing / Yandex / others when site content updates.
  # Manual-only — `_dev/ping-indexnow.js` explicitly states "NOT on every
  # build" because IndexNow throttles excessive pings. Trigger via
  # workflow_dispatch after a meaningful content release.
  indexnow:
    needs: deploy
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build sitemap (so the local script has fresh URLs)
        run: npm run build:pages
      - name: Wait for Pages CDN propagation
        run: sleep 30
      - name: Ping IndexNow
        run: npm run ping:indexnow
